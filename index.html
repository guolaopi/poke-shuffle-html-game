<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>答案之牌</title>
    <style>
        html {
            /* old theme */
            /* --main-page-color: #f7dfe7;
            --main-bg-color: linear-gradient(180deg, #fff5f7, #ffe7ef, #fce3ea);
            --main-text-color: #8c3458;
            --main-button-bg: linear-gradient(180deg, #ff7aa8, #e55688);
            --secondary-button-bg: linear-gradient(180deg, #c98ba4, #b6708d);
            --modal-overlay-bg: rgba(120, 70, 90, .28);
            --modal-panel-bg: linear-gradient(180deg, #fff7fa, #ffeaf1);
            --close-btn-bg: linear-gradient(180deg, #ff9bb8, #e86f98);
            --list-item-bg: #f57f3f; */

            /* macaroni theme */
            /* new theme — mint & lavender macaron */
            --main-page-color: #d4e8e0;
            --main-bg-color: linear-gradient(180deg, #f5fbf8, #e6f2ec, #dce8e2);
            --main-text-color: #4a6b5e;
            --main-button-bg: linear-gradient(180deg, #8fc1b0, #72a892);
            --secondary-button-bg: linear-gradient(180deg, #d4c9e8, #c0b3d9);
            --modal-overlay-bg: rgba(100, 120, 130, 0.25);
            --modal-panel-bg: linear-gradient(180deg, #fafffd, #f0f7f3);
            --close-btn-bg: linear-gradient(180deg, #f0d68a, #e8c46a);
            --list-item-bg: #f0d68a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--main-page-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Mono;
            color: #fff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            margin: 10px;
            width: calc(100vw - 20px);
            height: calc(100vh - 20px);
            border-radius: 18px;
            background: var(--main-bg-color);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, .08);
            box-shadow: 0 0 30px rgba(0, 0, 0, .5);
        }

        .header {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
            z-index: 5;
            color: var(--main-text-color);
        }

        #canvasWrap {
            position: absolute;
            top: 48px;
            left: 0;
            right: 0;
            bottom: 88px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            z-index: 10;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            min-width: 90px;
            background: var(--main-button-bg);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(229, 86, 136, .25);
        }

        button:active {
            transform: scale(.96);
        }

        .secondary {
            background: var(--secondary-button-bg);
        }

        .modal {
            position: absolute;
            inset: 0;
            background: var(--modal-overlay-bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn .25s linear;
        }

        .modal.show {
            display: flex;
        }

        .panel {
            width: 92%;
            max-height: 90%;
            background: var(--modal-panel-bg);
            border-radius: 20px;
            padding: 16px;
            overflow: auto;
            border: 1px solid #f2bfd0;
            box-shadow: 0 0 40px rgba(213, 108, 145, .18);
            animation: scaleIn .25s linear;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-item {
            background: var(--list-item-bg);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        .close-btn {
            margin-top: 16px;
            width: 100%;
            background: var(--close-btn-bg);
        }

        .link-box {
            word-break: break-all;
            background: #222;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            font-size: 13px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(.8)
            }

            to {
                transform: scale(1)
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="header" id="title">答案之牌</div>
        <div id="canvasWrap">
            <canvas id="game"></canvas>
        </div>
        <div class="controls" id="controls"></div>
        <div class="modal" id="modal">
            <div class="panel" id="panel"></div>
        </div>
    </div>
    <script src="./my54.js"></script>
    <script>
        const BACK_PATTERN = {
            bg: "#e8637a",
            line: "#cfefff",
            sticker: "🐱"
        };
        const FRONT_PATTERN = {
            bg: "#fff",
            line: "#aaa"
        };


        /* =========================
           工具
        ========================= */

        function qs(name) {
            return new URLSearchParams(location.search).get(name);
        }

        function base64Encode(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }
        function base64Decode(str) {
            return decodeURIComponent(escape(atob(str)));
        }

        function seededRandom(seed) {
            let x = seed;
            return function () {
                x ^= x << 13;
                x ^= x >> 17;
                x ^= x << 5;
                return ((x < 0 ? ~x + 1 : x) % 1000) / 1000;
            }
        }

        function shuffleBySeed(arr, seed) {
            const rand = seededRandom(seed);
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function randomSeed8() {
            return Math.random().toString(36).slice(2, 10);
        }

        function showModal(html) {
            panel.innerHTML = html;
            modal.classList.add("show");
        }

        function closeModal() {
            modal.classList.remove("show");
        }

        modal.onclick = (e) => {
            if (e.target === modal) closeModal();
        };

        /* =========================
           牌组
        ========================= */

        function createDeck() {
            let deck = [];
            let idx = 0;

            for (let s = 0; s < 4; s++) {
                for (let r = 0; r < 13; r++) {
                    deck.push({
                        suit: SUITS[s],
                        rank: RANKS[r],
                        answer: ANSWERS[idx] || ("答案" + idx),
                        id: idx
                    });
                    idx++;
                }
            }
            return deck;
        }

        /* =========================
           模式初始化
        ========================= */

        let mode = "normal";
        let dealer = "";
        let seed = "";
        let deck = createDeck();

        const q = qs("q");

        if (q) {
            try {
                const urlDecode = decodeURIComponent(q);
                const decoded = base64Decode(urlDecode);
                const arr = decoded.split(";;");
                dealer = arr[0];
                seed = arr[1];
                mode = "dealer";
                document.getElementById("title").innerText = "洗牌员：" + dealer;
                shuffleBySeed(deck, seed.split("").reduce((a, b) => a + b.charCodeAt(0), 0));
            } catch (e) {
                console.error(e);
            }
        } else {
            seed = randomSeed8();
            shuffleBySeed(deck, Date.now());
        }

        /* =========================
           Canvas
        ========================= */

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = canvas.clientWidth * devicePixelRatio;
            canvas.height = canvas.clientHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        resize();
        window.addEventListener("resize", resize);

        let cw, ch;
        function updateSize() {
            cw = canvas.clientWidth;
            ch = canvas.clientHeight;
        }
        updateSize();
        window.addEventListener("resize", updateSize);

        /* =========================
           绘制扑克
        ========================= */
        function drawRoundedRectByCtx(
            renderCtx,
            x,
            y,
            w,
            h,
            r
        ) {
            renderCtx.beginPath();

            renderCtx.moveTo(x + r, y);

            renderCtx.arcTo(
                x + w, y,
                x + w, y + h,
                r
            );

            renderCtx.arcTo(
                x + w, y + h,
                x, y + h,
                r
            );

            renderCtx.arcTo(
                x, y + h,
                x, y,
                r
            );

            renderCtx.arcTo(
                x, y,
                x + w, y,
                r
            );

            renderCtx.closePath();
        }

        function drawCard(card, x, y, w, h, faceUp = true, rot = 0, scale = 1, renderCtx = ctx, fontScale = 1) {
            renderCtx.save();

            renderCtx.translate(x, y);
            renderCtx.rotate(rot);
            renderCtx.scale(scale, scale);

            if (!faceUp) {
                drawRoundedRectByCtx(renderCtx, -w / 2, -h / 2, w, h, 10);
                renderCtx.fillStyle = BACK_PATTERN.bg;
                renderCtx.fill();

                renderCtx.shadowColor = "rgba(0,0,0,.18)";
                renderCtx.shadowBlur = 10;

                renderCtx.strokeStyle = BACK_PATTERN.line;
                renderCtx.lineWidth = 10;
                renderCtx.stroke();

                // back card sticker
                renderCtx.font = `70px Mono`;
                renderCtx.textAlign = "left";
                renderCtx.textBaseline = "top";

                renderCtx.fillText(
                    BACK_PATTERN.sticker,
                    -w / 2 + 26,
                    -h / 2 + 50
                );
                renderCtx.restore();
                return;
            }

            drawRoundedRectByCtx(renderCtx, -w / 2, -h / 2, w, h, 10);

            renderCtx.fillStyle = FRONT_PATTERN.bg; // card face color
            renderCtx.fill();

            renderCtx.shadowColor = "rgba(0,0,0,.2)";
            renderCtx.shadowBlur = 14;

            renderCtx.strokeStyle = FRONT_PATTERN.line;
            renderCtx.lineWidth = 1;
            renderCtx.stroke();

            let color = SUIT_COLORS[card.suit] || "#111";

            renderCtx.fillStyle = color;

            // 左上
            renderCtx.font = `bold ${20 * fontScale}px Mono`;
            renderCtx.textAlign = "left";
            renderCtx.textBaseline = "top";

            renderCtx.fillText(
                card.rank,
                -w / 2 + 10 - card.rank.length,
                -h / 2 + 20 * fontScale
            );

            // 左上花色
            // renderCtx.font = `${18 * fontScale}px Mono`;
            // renderCtx.fillText(
            //     card.suit,
            //     -w / 2 + card.rank.length * 6,
            //     -h / 2 + 50 * fontScale
            // );

            // 右下
            renderCtx.save();

            let rightDownRankXOffset =
                30 + (card.rank.length - 1) * 1;

            renderCtx.translate(
                w / 2 - (rightDownRankXOffset * fontScale),
                h / 2 - (5 * fontScale)
            );

            renderCtx.rotate(Math.PI);

            renderCtx.font = `bold ${20 * fontScale}px Mono`;
            renderCtx.textAlign = "right";
            renderCtx.textBaseline = "top";

            renderCtx.fillText(card.rank, -5 * fontScale, 0);

            // // 右下花色
            // renderCtx.font = `${18 * fontScale}px Mono`;
            // renderCtx.fillText(
            //     card.suit,
            //     3 - (card.rank.length) * 3,
            //     28 * fontScale
            // );

            renderCtx.restore();

            // 中央花色
            renderCtx.font = `${70 * fontScale}px Mono`;
            renderCtx.textAlign = "center";
            renderCtx.textBaseline = "middle";
            renderCtx.globalAlpha = .9;

            renderCtx.fillText(card.suit, 0, 10);

            // 右上tip
            renderCtx.save();
            renderCtx.translate(
                w / 2 - (10 * fontScale),
                -h / 2 + 18
            );

            renderCtx.font = `${8 * fontScale}px Mono`;
            renderCtx.textAlign = "center";
            renderCtx.textBaseline = "top";
            tip = "给你的答案是"
            for (let i = 0; i < tip.length; i++) {
                renderCtx.fillText(
                    tip[i],
                    0,
                    i * 9 * fontScale
                );
            }

            renderCtx.restore();

            // 右上答案
            renderCtx.save();
            renderCtx.translate(
                w / 2 - (20 * fontScale),
                -h / 2 + 18
            );

            renderCtx.font = `bold ${14 * fontScale}px Mono`;
            renderCtx.textAlign = "center";
            renderCtx.textBaseline = "top";

            for (let i = 0; i < card.answer.length; i++) {
                renderCtx.fillText(
                    card.answer[i],
                    -8 * fontScale,
                    i * 15 * fontScale
                );
            }

            renderCtx.restore();

            renderCtx.restore();
        }

        /* =========================
           动画
        ========================= */
        let spinning = true;
        let spinAngle = 0;
        let shuffleAnim = 0;
        let drawingAnim = 0;
        let floatingCards = [];

        for (let i = 0; i < 5; i++) {
            floatingCards.push({
                idx: Math.floor(Math.random() * deck.length),
                offset: i * 0.6
            });
        }

        function render() {
            requestAnimationFrame(render);

            ctx.clearRect(0, 0, cw, ch);

            const cardW = Math.min(cw * 0.34, 170);
            const cardH = cardW * 1.45;

            // 牌堆
            let deckX = cw / 2;
            let deckY = ch * 0.58;

            if (shuffleAnim > 0) {
                shuffleAnim -= 0.02;
                if (shuffleAnim < 0) shuffleAnim = 0;
            }

            let shuffleOffset = Math.sin(shuffleAnim * 40) * 20;

            for (let i = 0; i < 27; i++) {
                drawCard(
                    deck[i % deck.length],
                    deckX + i * 0.5 + (shuffleAnim ? ((Math.random() - .5) * shuffleOffset) : 0),
                    deckY - i * 0.8,
                    cardW,
                    cardH,
                    false,
                    -0.78 + Math.sin(i) * 0.01
                );
            }

            // 旋转展示牌
            if (spinning) {
                spinAngle += 0.01;
            }

            if (spinning) {
                floatingCards.forEach((f, i) => {
                    let a = spinAngle + f.offset;
                    let x = cw / 2 + Math.cos(a) * cw * 0.22;
                    let y = ch * 0.28 + Math.sin(a * 2) * 20;

                    let scale = 1.4 + (Math.sin(a) + 1) * 0.12;

                    drawCard(
                        deck[f.idx],
                        x,
                        y,
                        cardW * 0.78,
                        cardH * 0.78,
                        true,
                        Math.sin(a) * 0.15,
                        scale,
                        ctx,
                        0.8
                    );
                });
            }

            // 抽牌动画
            if (drawingAnim > 0) {
                drawingAnim -= 0.025;

                let progress = 1 - drawingAnim;

                let tx = cw / 2;
                let ty = ch * 0.22;

                let sx = deckX;
                let sy = deckY;

                let x = sx + (tx - sx) * progress;
                let y = sy + (ty - sy) * progress;

                drawCard(
                    currentDrawCard,
                    x,
                    y,
                    cardW * 1.1,
                    cardH * 1.1,
                    false, // 出结果之前显示背面
                    -0.78 + progress * 0.78
                );

                if (drawingAnim <= 0) {
                    setTimeout(() => {
                        showCardPopup(currentDrawCard);
                    }, 100);
                }
            }
        }
        render();

        /* =========================
           抽牌逻辑
        ========================= */
        let results = [];
        let currentDrawCard = null;

        function shuffleDeck() {
            shuffleAnim = 1;
            spinning = false;

            setTimeout(() => {
                shuffleBySeed(deck, Math.random() * 999999 | 0);
                spinning = true;
            }, 1000);
        }

        function drawOne() {
            if (drawingAnim > 0 || shuffleAnim > 0) return;

            spinning = false;

            if (mode === "normal") {
                shuffleAnim = 1;

                setTimeout(() => {
                    shuffleBySeed(deck, Math.random() * 999999 | 0);

                    currentDrawCard = deck.shift();
                    results.push(currentDrawCard);

                    drawingAnim = 1;

                    setTimeout(() => {
                        deck.push(currentDrawCard);
                        shuffleBySeed(deck, Math.random() * 999999 | 0);
                        spinning = true;
                    }, 1200);

                }, 1000);

            } else {
                currentDrawCard = deck.shift();
                results.push(currentDrawCard);

                drawingAnim = 1;

                setTimeout(() => {
                    deck.push(currentDrawCard);
                    spinning = true;
                }, 1200);
            }
        }

        /* =========================
           弹窗
        ========================= */
        function cardHtml(card) {
            return `<div style="display:flex;justify-content:center;padding:10px;"><canvas id="popupCard" width="360" height="560" style="width:85vw;max-width:360px;"></canvas></div><div style="text-align:center;font-size:18px;font-weight:700;margin-top:6px;">${card.rank} ${card.suit} - ${card.answer}</div><button class="close-btn" onclick="closeModal()">关闭</button>`;
        }

        function showCardPopup(card) {
            showModal(`<div style="display:flex;justify-content:center;align-items:center;padding:12px;"><canvas id="popupCard" width="420" height="640"></canvas></div><div style="text-align:center;font-size:20px;font-weight:700;color:#944f68;margin-top:6px;">${card.rank}${card.suit}·${card.answer}</div>
        <button class="close-btn" onclick="closeModal()">关闭</button>`);

            requestAnimationFrame(() => {
                const popupCanvas =
                    document.getElementById("popupCard");

                if (!popupCanvas) return;

                const popupCtx =
                    popupCanvas.getContext("2d");

                popupCtx.clearRect(
                    0,
                    0,
                    popupCanvas.width,
                    popupCanvas.height
                );

                drawCard(
                    card,
                    popupCanvas.width / 2,
                    popupCanvas.height / 2,
                    260,
                    380,
                    true,
                    0,
                    1.4,
                    popupCtx,
                    1.4
                );
            });
        }
        function showResults() {
            if (!results.length) {
                showModal(`<div style="text-align:center;padding:30px 0;color:rgb(140, 52, 88);">暂无结果</div><button class="close-btn" onclick="closeModal()">关闭</button>`);
                return;
            }
            let html = `<div style="font-size:20px;font-weight:700;margin-bottom:14px;color:rgb(140, 52, 88);">本轮结果</div>`;
            html += `<div class="result-list">`;
            results.forEach((r, i) => {
                html += `<div class="result-item" onclick="showCardPopup(results[${i}])">第${i + 1} 张：${r.rank}${r.suit} - ${r.answer}</div>`;
            });
            html += `</div><button class="close-btn" onclick="closeModal()">关闭</button>`;
            showModal(html);
        }

        function shareShuffle() {
            const name = prompt("请输入洗牌员姓名");
            if (!name) return;

            spinning = false;
            shuffleAnim = 1;

            setTimeout(() => {
                const s = randomSeed8();
                const arr = createDeck();
                shuffleBySeed(arr, s.split("").reduce((a, b) => a + b.charCodeAt(0), 0));
                const token = base64Encode(name + ";;" + s);
                const urlEncode = encodeURIComponent(token);
                const url = location.origin + location.pathname + "?q=" + urlEncode;
                spinning = true;
                showModal(`<div style="font-size:20px;font-weight:700;">洗牌分享链接</div><div class="link-box">${url}</div><button onclick="navigator.clipboard.writeText('${url}')" style="margin-top:12px;width:100%;">复制链接</button><button class="close-btn" onclick="closeModal()">关闭</button>`);
            }, 1000);
        }

        /* =========================
           按钮
        ========================= */
        const controls = document.getElementById("controls");
        if (mode === "normal") {
            controls.innerHTML = `<button onclick="drawOne()">抽一张</button><button onclick="shareShuffle()">洗牌分享</button><button class="secondary" onclick="showResults()">本轮结果</button>`;
        } else {
            controls.innerHTML = `<button onclick="drawOne()">抽一张</button><button class="secondary" onclick="showResults()">本轮结果</button><button class="secondary" onclick="location.href=location.pathname">主界面</button>`;
        }
    </script>
</body>

</html>
